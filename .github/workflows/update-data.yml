name: Atualizar dados NPS

on:
  schedule:
    - cron: '0 11 * * *'   # Todo dia às 11h UTC (8h horário de Brasília)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install google-cloud-bigquery pyarrow

      - name: Gerar data.js via BigQuery
        run: python refresh_nps_data.py

      - name: Commit e push do data.js atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "dados: atualização automática $(date +%Y-%m-%d)"
          git push
